
[functions.opensky-proxy]
enabled = true
# verify_jwt rejects requests without a validly-signed project JWT. The function
# additionally requires the caller to be an authenticated user (not the anon
# key) — see isAuthenticatedUser() in index.ts.
verify_jwt = true
import_map = "./functions/opensky-proxy/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/opensky-proxy/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/opensky-proxy/*.html" ]

[functions.astronomy-proxy]
enabled = true
verify_jwt = true
entrypoint = "./functions/astronomy-proxy/index.ts"

[functions.delete-account]
enabled = true
verify_jwt = true
import_map = "./functions/delete-account/deno.json"
entrypoint = "./functions/delete-account/index.ts"
